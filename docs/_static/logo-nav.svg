<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#243a7a"/>
      <stop offset="100%" stop-color="#1a2a60"/>
    </linearGradient>
    <linearGradient id="lidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e1f6e"/>
      <stop offset="100%" stop-color="#221558"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Box body -->
  <rect x="14" y="52" width="92" height="58" rx="10"
        fill="url(#bodyGrad)" stroke="#4f8ef7" stroke-width="2.2"/>

  <!-- Tape strip down centre -->
  <rect x="53" y="52" width="14" height="58" rx="0"
        fill="#4f8ef7" fill-opacity="0.10"/>

  <!-- Box lid -->
  <rect x="8"  y="30" width="104" height="28" rx="9"
        fill="url(#lidGrad)" stroke="#a855f7" stroke-width="2.2"/>

  <!-- Tape strip on lid -->
  <rect x="53" y="30" width="14" height="28"
        fill="#a855f7" fill-opacity="0.10"/>

  <!-- Latch / clasp -->
  <rect x="43" y="20" width="34" height="17" rx="6"
        fill="#4f8ef7" fill-opacity="0.30"
        stroke="#4f8ef7" stroke-width="1.8"/>
  <!-- latch pin -->
  <circle cx="60" cy="28" r="3.5" fill="#4f8ef7" opacity="0.9" filter="url(#glow)"/>

  <!-- Neural dots packed inside box -->
  <circle cx="38" cy="76" r="6"   fill="#4f8ef7"  opacity="0.90" filter="url(#glow)"/>
  <circle cx="60" cy="66" r="5"   fill="#ffffff"  opacity="0.85"/>
  <circle cx="82" cy="76" r="6"   fill="#a855f7"  opacity="0.90" filter="url(#glow)"/>
  <circle cx="49" cy="95" r="4.5" fill="#4f8ef7"  opacity="0.75"/>
  <circle cx="71" cy="95" r="4.5" fill="#a855f7"  opacity="0.75"/>

  <!-- Connection lines between dots -->
  <g stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.28" stroke-linecap="round">
    <line x1="38" y1="76" x2="60" y2="66"/>
    <line x1="60" y1="66" x2="82" y2="76"/>
    <line x1="38" y1="76" x2="49" y2="95"/>
    <line x1="82" y1="76" x2="71" y2="95"/>
    <line x1="49" y1="95" x2="71" y2="95"/>
  </g>

  <!-- Edge highlight on box body top -->
  <rect x="14" y="52" width="92" height="6" rx="10"
        fill="#4f8ef7" fill-opacity="0.12"/>
</svg>
